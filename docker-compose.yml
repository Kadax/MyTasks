version: '3.9'

services:

  db:
    image: postgres:16.6
    restart: always
            
    environment:
      POSTGRES_PASSWORD: P|9)+)382kuL&ei
      POSTGRES_DB: "MyTasks"
      POSTGRES_USER: "TasksUser"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    
    volumes:      
      - E:\Docker\MyTasks\PGData:/var/lib/postgresql/data
      
    ports:
      - "5432:5432"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TasksUser -d MyTasks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      MyTaskNetwork:
        aliases:
          - db
  
      
  MyTask-backend:
    image: otherdomain.ru:5000/mytask-backend-docker
    ports:
      - "82:8080"
    volumes:
      - type: bind
        source: E:\Docker\MyTasks\BackEnd\app\appsettings.json
        target: /app/appsettings.json

    networks:
      MyTaskNetwork:
        aliases:
          - backend

  MyTask-front:
    image: otherdomain.ru:5000/mytask-front-docker
    ports:
      - "81:8080"
    volumes:
      - type: bind
        source: E:\Docker\MyTasks\FrontEnd\env.json
        target: /usr/share/nginx/html/config/env.json

      - type: bind
        source: E:\Docker\MyTasks\FrontEnd\env.production.json
        target: /usr/share/nginx/html/config/env.production.json

    networks:
      MyTaskNetwork:
        aliases:
          - frontend
  
  nginx:
    image: nginx:latest
    container_name: proxy_nginx
    volumes:
      - E:\Docker\MyTasks\nginx\Proxy\reverse_proxy.conf:/etc/nginx/conf.d/default.conf
      - E:\Docker\MyTasks\nginx\Proxy\cert\:/etc/nginx/cert/
    ports:
      - 89:89
      - 443:443

    networks:
      MyTaskNetwork:
        aliases:
          - proxy
      reverse-proxy:
        aliases:
          - proxy_nginx    


     
networks:
  MyTaskNetwork:
    driver: bridge
  reverse-proxy:
    external: true