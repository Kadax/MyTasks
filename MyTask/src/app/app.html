<div class="full-h">
    <div class="header">
      <h1>Мои задачи</h1>

      <div class="settings">
        @if (this.authService.isLogin){
          <button matMiniFab (click)="this.toggleDarkMode()">
            <mat-icon>dark_mode</mat-icon>
          </button>
        }
        @if (this.authService.isLogin){
          <button matMiniFab routerLink="changepass">
            <mat-icon>manage_accounts</mat-icon>
          </button>
        }
        @if (this.authService.isAdmin()) {
          <button  matMiniFab routerLink="settings">
            <mat-icon>settings</mat-icon>
          </button>
        }
      </div>
    </div>
    <router-outlet></router-outlet>
</div>
